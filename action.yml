name: 'Skylence Lint'
description: 'Lint .sky workflow files and annotate PRs with findings. Optionally uploads SARIF to GitHub Security tab.'

branding:
  icon: 'check-circle'
  color: 'green'

inputs:
  version:
    description: 'sky version to install (e.g. v0.5.1). Defaults to latest release.'
    required: false
    default: 'latest'
  scope:
    description: 'Lint scope: repo (only .sky/workflows/ in the checked-out repo) or all (repo + workspace + user tiers). Ignored when paths is set.'
    required: false
    default: 'repo'
  paths:
    description: 'Explicit file paths or globs to lint (e.g. "workflows/*.sky"). When set, overrides scope and lints exactly these paths. Use for repos whose .sky files live outside .sky/workflows/.'
    required: false
    default: ''
  sarif:
    description: 'Upload SARIF 2.1.0 results to the GitHub Security tab (requires contents: write and security-events: write permissions).'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Install sky
      shell: bash
      run: |
        "${{ github.action_path }}/scripts/install.sh" \
          --version "${{ inputs.version }}" \
          --no-setup
        echo "/usr/local/bin" >> "$GITHUB_PATH"

    - name: Run sky lint
      id: lint
      shell: bash
      continue-on-error: true
      env:
        SKY_LINT_PATHS: ${{ inputs.paths }}
        SKY_LINT_SCOPE: ${{ inputs.scope }}
      run: |
        set +e
        if [ -n "$SKY_LINT_PATHS" ]; then
          # Unquoted on purpose: let bash expand globs like workflows/*.sky.
          sky lint --format json $SKY_LINT_PATHS > lint.raw.json
        else
          sky lint --format json --scope "$SKY_LINT_SCOPE" > lint.raw.json
        fi
        rc=$?
        # Explicit-path mode emits one JSON array per file; merge into a single
        # array so annotate.sh and the fail gate see one document. Scope mode
        # emits a single array already; `jq -s add` is a no-op shape-wise there.
        jq -s 'add // []' lint.raw.json > lint.json
        exit $rc

    - name: Annotate PR
      if: always()
      shell: bash
      run: |
        "${{ github.action_path }}/scripts/annotate.sh" lint.json

    - name: Generate SARIF
      if: ${{ inputs.sarif == 'true' && always() }}
      shell: bash
      env:
        SKY_LINT_PATHS: ${{ inputs.paths }}
        SKY_LINT_SCOPE: ${{ inputs.scope }}
      run: |
        if [ -n "$SKY_LINT_PATHS" ]; then
          sky lint --format sarif $SKY_LINT_PATHS > lint.sarif
        else
          sky lint --format sarif --scope "$SKY_LINT_SCOPE" > lint.sarif
        fi

    - name: Upload SARIF
      if: ${{ inputs.sarif == 'true' && always() }}
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: lint.sarif
        category: sky-lint

    - name: Fail on lint errors
      if: steps.lint.outcome == 'failure'
      shell: bash
      run: |
        count=$(jq 'length' lint.json 2>/dev/null || echo 0)
        echo "sky lint found ${count} problem(s)" >&2
        exit 1
