name: 'Skylence Lint'
description: 'Lint .sky workflow files and annotate PRs with findings. Optionally uploads SARIF to GitHub Security tab.'

branding:
  icon: 'check-circle'
  color: 'green'

inputs:
  version:
    description: 'sky-workflow-lint version to install (e.g. v0.1.0). Defaults to latest release.'
    required: false
    default: 'latest'
  scope:
    description: 'Lint scope: repo (only .sky/workflows/ in the checked-out repo) or all (repo + workspace + user tiers). Ignored when paths is set.'
    required: false
    default: 'repo'
  paths:
    description: 'Explicit file paths or globs to lint (e.g. "workflows/*.sky"). When set, overrides scope and lints exactly these paths. Use for repos whose .sky files live outside .sky/workflows/.'
    required: false
    default: ''
  sarif:
    description: 'Upload SARIF 2.1.0 results to the GitHub Security tab (requires contents: write and security-events: write permissions).'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Install sky-workflow-lint
      shell: bash
      run: |
        # Install to a job-writable dir (never /usr/local/bin, which needs sudo
        # and fails non-interactively on self-hosted runners). --force ensures
        # the requested version is fetched even when a persistent self-hosted
        # runner already carries a stale binary on PATH.
        install_dir="${RUNNER_TEMP:-/tmp}/sky-lint-bin"
        mkdir -p "$install_dir"
        FORCE=1 "${{ github.action_path }}/scripts/install.sh" \
          --version "${{ inputs.version }}" \
          --dir "$install_dir" \
          --force
        echo "$install_dir" >> "$GITHUB_PATH"

    - name: Run sky-workflow-lint
      id: lint
      shell: bash
      continue-on-error: true
      env:
        SKY_LINT_PATHS: ${{ inputs.paths }}
        SKY_LINT_SCOPE: ${{ inputs.scope }}
      run: |
        set +e
        if [ -n "$SKY_LINT_PATHS" ]; then
          # Unquoted on purpose: let bash expand globs like .sky/**/*.sky.
          paths="$SKY_LINT_PATHS"
        elif [ "$SKY_LINT_SCOPE" = "all" ]; then
          paths=".sky/**/*.sky"
        else
          paths=".sky/workflows/*.sky"
        fi
        sky-workflow-lint --format json $paths > lint.json
        exit $?

    - name: Annotate PR
      if: always()
      shell: bash
      run: |
        "${{ github.action_path }}/scripts/annotate.sh" lint.json

    - name: Generate SARIF
      if: ${{ inputs.sarif == 'true' && always() }}
      shell: bash
      env:
        SKY_LINT_PATHS: ${{ inputs.paths }}
        SKY_LINT_SCOPE: ${{ inputs.scope }}
      run: |
        if [ -n "$SKY_LINT_PATHS" ]; then
          paths="$SKY_LINT_PATHS"
        elif [ "$SKY_LINT_SCOPE" = "all" ]; then
          paths=".sky/**/*.sky"
        else
          paths=".sky/workflows/*.sky"
        fi
        sky-workflow-lint --format sarif $paths > lint.sarif

    - name: Upload SARIF
      if: ${{ inputs.sarif == 'true' && always() }}
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: lint.sarif
        category: sky-lint

    - name: Fail on lint errors
      if: steps.lint.outcome == 'failure'
      shell: bash
      run: |
        count=$(jq 'length' lint.json 2>/dev/null || echo 0)
        echo "sky-workflow-lint found ${count} problem(s)" >&2
        exit 1
